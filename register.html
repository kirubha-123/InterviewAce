<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewAce | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="register">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">InterviewAce</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0"><button id="darkModeToggle" type="button" class="btn btn-sm btn-outline-light">Dark Mode</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <section class="quiz-card p-4 p-md-5 animate-up">
          <h2 class="mb-2">Register</h2>
          <p class="text-muted mb-4">Create your account first, then login using token-based session.</p>

          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label for="registerName" class="form-label">Name</label>
              <input id="registerName" type="text" class="form-control" required />
            </div>
            <div class="mb-3">
              <label for="registerEmail" class="form-label">Email</label>
              <input id="registerEmail" type="email" class="form-control" required />
            </div>
            <div class="mb-3">
              <label for="registerPassword" class="form-label">Password</label>
              <input id="registerPassword" type="password" minlength="6" class="form-control" required />
            </div>
            <div id="registerMessage" class="alert d-none" role="alert"></div>
            <button type="submit" class="btn btn-main w-100">Create Account</button>
          </form>

          <p class="mt-3 mb-0">Already registered? <a href="login.html">Login here</a></p>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer py-4 mt-4">
    <div class="container text-center">
      <small>&copy; 2026 InterviewAce</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
