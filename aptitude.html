<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewAce | Aptitude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="aptitude">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">InterviewAce</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="aptitude.html">Aptitude</a></li>
          <li class="nav-item"><a class="nav-link" href="coding.html">Coding</a></li>
          <li class="nav-item"><a class="nav-link" href="interview.html">Interview</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0"><button id="darkModeToggle" type="button" class="btn btn-sm btn-outline-light">Dark Mode</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="page-head mb-4 animate-up">
      <h1 class="mb-2">Aptitude Quiz</h1>
      <p class="mb-0">Solve one question at a time. Timer is running for each question.</p>
    </div>

    <section class="quiz-card p-4 p-md-5 animate-up delay-1">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <span id="questionCounter" class="hero-chip">Question 1 / 5</span>
        <span id="timerDisplay" class="timer-pill">Time Left: 15s</span>
      </div>

      <h5 id="aptitudeQuestion" class="mb-4"></h5>
      <div id="aptitudeOptions" class="d-grid gap-2"></div>
      <div id="aptitudeFeedback" class="answer-box mt-3 d-none"></div>

      <div class="d-flex justify-content-end mt-4">
        <button id="nextAptitudeBtn" class="btn btn-main" disabled>Next Question</button>
      </div>

      <div id="aptitudeResult" class="result-box mt-4 d-none"></div>
    </section>
  </main>

  <footer class="site-footer py-4 mt-4">
    <div class="container text-center">
      <p class="mb-1">Practice smart, score better.</p>
      <small>&copy; 2026 InterviewAce</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
